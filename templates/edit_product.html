{% extends "base.html" %}

{% block content %}

<h1 class="mb-4">Edit Product</h1>

<div class="card">
    <div class="card-header">
        Editing: {{ product.name }}
    </div>

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Barcode</label>
                <input type="text" class="form-control" name="barcode" value="{{ product.barcode }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Product Code</label>
                <input type="text" class="form-control" name="product_code" value="{{ product.product_code }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Product Name</label>
                <input type="text" class="form-control" name="name" value="{{ product.name }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>
                <input type="text" class="form-control" name="category" value="{{ product.category }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Supplier</label>
                <input type="text" class="form-control" name="supplier" value="{{ product.supplier }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Location</label>
                <input type="text" class="form-control" name="location" value="{{ product.location }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Current Stock</label>
                <input type="number" class="form-control" name="stock_quantity" value="{{ product.stock_quantity }}" min="0">
            </div>

            <div class="mb-3">
                <label class="form-label">Reorder Level</label>
                <input type="number" class="form-control" name="reorder_level" value="{{ product.reorder_level }}" min="0">
            </div>

            <div class="mb-3">
                <label class="form-label">Cost Price</label>
                <input type="number" step="0.01" class="form-control" name="cost_price" value="{{ product.cost_price }}" min="0">
            </div>

            <button type="submit" class="btn btn-success">
                Save Changes
            </button>

            <a href="/products" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>
</div>

{% endblock %}
