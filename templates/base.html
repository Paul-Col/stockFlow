<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockFlow Inventory Management</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="/">
            📦 StockFlow
        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav">

                <li class="nav-item">
                    <a class="nav-link" href="/">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/products">Products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/add-product">Add Product</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/movements">Stock Movements</a>
                </li>

                <li class="nav-item dropdown">

                    <a
                        class="nav-link dropdown-toggle"
                        href="#"
                        id="reportsDropdown"
                        role="button"
                        data-bs-toggle="dropdown"
                        aria-expanded="false">

                        Reports

                    </a>

                    <ul class="dropdown-menu" aria-labelledby="reportsDropdown">

                        <li>
                            <a class="dropdown-item" href="/stock-sheet">
                                Current Stock Sheet
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item" href="/reports/low-stock">
                                Low Stock Report
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item" href="/reports/stock-valuation">
                                Stock Valuation
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item" href="/reports/stock-movements">
                                Stock Movement Report
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item" href="/reports/suppliers">
                            Supplier Report
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item" href="/reports/inventory-audit">
                                     Inventory Audit
                            </a>
                        </li>

                    </ul>

                </li>

            </ul>

        </div>

    </div>

</nav>

<main class="container mt-4">
    {% block content %}
    {% endblock %}
</main>

<footer class="bg-light text-center mt-5 py-3">
    <small class="text-muted">
        Paul Collingwood © 2026
    </small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
